<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RILA 用户认证系统</title>
    <link rel="stylesheet" href="qrc:///resources/css/bootstrap.min.css">
    <link rel="stylesheet" href="qrc:///resources/css/local-fonts.css">
    <link rel="stylesheet" href="qrc:///resources/css/local-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            /* 字体将由 local-fonts.css 统一管理 */
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body {
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }
        
        .auth-container {
            width: 100%;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex: 1;
        }
        
        .auth-left {
            flex: 1;
            position: relative;
            height: 100%;
            background-image: url('qrc:///resources/rila-left-logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2%;
        }
        
        .brand-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        
        .brand-subtitle {
            font-size: clamp(0.9rem, 1.8vw, 1.4rem);
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
            line-height: 1.4;
            font-weight: 500;
        }
        
        .auth-right {
            flex: 1;
            padding: 3% 4%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
            height: 100%;
            overflow-y: auto;
            max-height: 100vh;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }
        
        .auth-title {
            font-size: clamp(1.5rem, 2.5vw, 2rem);
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .auth-subtitle {
            color: #64748b;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }
        
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: clamp(0.85rem, 1.1vw, 0.95rem);
            display: block;
        }
        
        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: clamp(0.9rem, 1.1vw, 1rem);
            transition: all 0.3s ease;
            background: #f9fafb;
            width: 100%;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #ffffff;
            outline: none;
        }
        
        .form-control.is-invalid {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .invalid-feedback {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 5px;
        }
        
        .form-check {
            margin: 1rem 0;
            flex-shrink: 0;
        }
        
        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.1vw, 1rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            flex-shrink: 0;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.1vw, 1rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            flex-shrink: 0;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .switch-form {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }
        
        .switch-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .switch-link:hover {
            color: #5a67d8;
            text-decoration: underline;
        }
        

        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* 页面加载动画 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        .page-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-content {
            text-align: center;
            color: white;
        }
        
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .loader-text {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
                height: 100vh;
            }
            
            .auth-left {
                flex: 0 0 35%;
                height: 35%;
            }
            
            .auth-right {
                flex: 1;
                height: 65%;
                padding: 2% 4%;
            }
        }
        
        /* 极小屏幕 */
        @media (max-width: 480px) {
            .auth-left {
                flex: 0 0 30%;
                height: 30%;
            }
            
            .auth-right {
                height: 70%;
                padding: 3% 4%;
            }
            
            .form-control {
                padding: 0.5rem 0.75rem;
            }
            
            .btn-primary, .btn-success {
                padding: 0.6rem 1rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
        }
        
        /* 确保表单容器不会溢出 */
        #loginPanel, #registerPanel {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- 左侧Logo区域 -->
        <div class="auth-left">
            <div class="logo-overlay">
                <h1 class="brand-title">RILA</h1>
                <p class="brand-subtitle">安全可靠的企业级用户认证系统</p>
            </div>
        </div>
        
        <!-- 右侧表单区域 -->
        <div class="auth-right">
            <div class="auth-header">
                <h2 class="auth-title" id="authTitle">
                    <i class="bi bi-shield-lock"></i>
                    用户登录
                </h2>
                <p class="auth-subtitle">请输入您的凭据以访问系统</p>
            </div>
            <!-- 登录表单 -->
            <form id="loginPanel">
                <div class="form-group">
                    <label for="loginUserId" class="form-label">
                        <i class="bi bi-envelope"></i> 邮箱地址
                    </label>
                    <input type="email" class="form-control" id="loginUserId" placeholder="请输入您的邮箱地址" required>
                    <div class="invalid-feedback" id="loginUserIdError"></div>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword" class="form-label">
                        <i class="bi bi-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="请输入您的密码" required>
                    <div class="invalid-feedback" id="loginPasswordError"></div>
                </div>
                
                <div class="form-group">
                    <label for="loginDeviceId" class="form-label">
                        <i class="bi bi-device-hdd"></i> 设备标识 (可选)
                    </label>
                    <input type="text" class="form-control" id="loginDeviceId" placeholder="留空将自动生成">
                </div>
                
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        记住登录信息
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    <span class="normal">
                        <i class="bi bi-box-arrow-in-right"></i> 立即登录
                    </span>
                    <span class="loading" style="display:none;">
                        <span class="loading-spinner"></span>
                        登录中...
                    </span>
                </button>
                
                <div class="switch-form">
                    <span class="text-muted">还没有账号？</span>
                    <a href="#" class="switch-link" onclick="switchToRegister()">立即注册</a>
                </div>
            </form>
            <!-- 注册表单 -->
            <form id="registerPanel" style="display:none;">
                <div class="form-group">
                    <label for="registerUserId" class="form-label">
                        <i class="bi bi-envelope"></i> 邮箱地址
                    </label>
                    <input type="email" class="form-control" id="registerUserId" placeholder="请输入您的邮箱地址" required>
                    <div class="invalid-feedback" id="registerUserIdError"></div>
                </div>
                
                <div class="form-group">
                    <label for="registerName" class="form-label">
                        <i class="bi bi-person"></i> 姓名
                    </label>
                    <input type="text" class="form-control" id="registerName" placeholder="请输入您的姓名" required>
                    <div class="invalid-feedback" id="registerNameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="registerPhone" class="form-label">
                        <i class="bi bi-telephone"></i> 手机号码 (可选)
                    </label>
                    <input type="text" class="form-control" id="registerPhone" placeholder="请输入您的手机号码">
                </div>
                
                <div class="form-group">
                    <label for="registerPassword" class="form-label">
                        <i class="bi bi-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" id="registerPassword" placeholder="请设置您的密码" required>
                    <div class="invalid-feedback" id="registerPasswordError"></div>
                </div>
                
                <button type="submit" class="btn btn-success w-100" id="registerBtn">
                    <span class="normal">
                        <i class="bi bi-person-plus"></i> 立即注册
                    </span>
                    <span class="loading" style="display:none;">
                        <span class="loading-spinner"></span>
                        注册中...
                    </span>
                </button>
                
                <div class="switch-form">
                    <span class="text-muted">已有账号？</span>
                    <a href="#" class="switch-link" onclick="switchToLogin()">返回登录</a>
                </div>
            </form>

            

        </div>
    </div>
    <script src="qrc:///resources/qwebchannel.js"></script>
    <script>
        // ================== 全局变量 ==================
        let qtBridge = null;
        let credentialsLoaded = false;
        let currentToken = '';

        // ================== 页面切换 ==================
        function switchToRegister() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'block';
            document.getElementById('authTitle').innerHTML = '<i class="bi bi-person-plus"></i> 用户注册';
            document.querySelector('.auth-subtitle').textContent = '请填写以下信息创建新账户';
        }
        function switchToLogin() {
            document.getElementById('registerPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('authTitle').innerHTML = '<i class="bi bi-shield-lock"></i> 用户登录';
            document.querySelector('.auth-subtitle').textContent = '请输入您的凭据以访问系统';
        }

        // ================== Qt Bridge 初始化 ==================
        document.addEventListener('DOMContentLoaded', function() {
            initializeQtBridge();
        });
        function initializeQtBridge() {
            if (typeof QWebChannel === 'undefined' || typeof qt === 'undefined') {
                setTimeout(initializeQtBridge, 100);
                return;
            }
            new QWebChannel(qt.webChannelTransport, function(channel) {
                qtBridge = channel.objects.loginBridge;
                if (qtBridge) {
                    // 信号可选：如需Qt->JS通信可在此添加
                }
                // 页面加载后自动填充凭据
                setTimeout(loadSavedCredentials, 50);
            });
        }

        // ================== 登录表单逻辑 ==================
        document.getElementById('loginPanel').addEventListener('submit', async function(e) {
            e.preventDefault();
            resetValidation('login');
            const userId = document.getElementById('loginUserId').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            let hasError = false;
            if (!userId) {
                setInvalid('loginUserId', 'loginUserIdError', '请输入邮箱地址'); hasError = true;
            } else if (!isValidEmail(userId)) {
                setInvalid('loginUserId', 'loginUserIdError', '请输入有效的邮箱地址'); hasError = true;
            }
            if (!password) {
                setInvalid('loginPassword', 'loginPasswordError', '请输入密码'); hasError = true;
            }
            if (hasError) return;
            setLoading('login', true);
            const formData = { userId, password, deviceId: document.getElementById('loginDeviceId').value.trim() || null };
            try {
                const response = await fetch('http://125.122.157.97:8081/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    currentToken = result.token;
                    // 记住密码
                    const rememberMe = document.getElementById('rememberMe').checked;
                    if (rememberMe && qtBridge && qtBridge.saveCredentials) {
                        qtBridge.saveCredentials(userId, password);
                    } else if (!rememberMe && qtBridge && qtBridge.clearCredentials) {
                        qtBridge.clearCredentials();
                    }
                    // 通知Qt登录成功
                    if (qtBridge && qtBridge.onLoginSuccess) qtBridge.onLoginSuccess(result.token);
                } else {
                    // 登录失败，通知Qt端处理
                    if (qtBridge && qtBridge.onLoginError) {
                        qtBridge.onLoginError(result.message || '登录失败');
                    }
                }
            } catch (error) {
                // 网络错误，通知Qt端处理
                if (qtBridge && qtBridge.onLoginError) {
                    qtBridge.onLoginError('网络连接失败');
                }
                console.log('登录请求失败:', error);
            } finally {
                setLoading('login', false);
            }
        });

        // ================== 注册表单逻辑 ==================
        document.getElementById('registerPanel').addEventListener('submit', async function(e) {
            e.preventDefault();
            resetValidation('register');
            const userId = document.getElementById('registerUserId').value.trim();
            const name = document.getElementById('registerName').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            let hasError = false;
            if (!userId) {
                setInvalid('registerUserId', 'registerUserIdError', '请输入邮箱地址'); hasError = true;
            } else if (!isValidEmail(userId)) {
                setInvalid('registerUserId', 'registerUserIdError', '请输入有效的邮箱地址'); hasError = true;
            }
            if (!name) {
                setInvalid('registerName', 'registerNameError', '请输入姓名'); hasError = true;
            }
            if (!password) {
                setInvalid('registerPassword', 'registerPasswordError', '请输入密码'); hasError = true;
            } else if (password.length < 6) {
                setInvalid('registerPassword', 'registerPasswordError', '密码至少需要6位'); hasError = true;
            }
            if (hasError) return;
            setLoading('register', true);
            const formData = { userId, name, phone, password };
            try {
                const response = await fetch('http://125.122.157.97:8081/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    // 注册成功，通知Qt端并切换到登录
                    if (qtBridge && qtBridge.onRegisterSuccess) {
                        qtBridge.onRegisterSuccess(result.message || '注册成功');
                    }
                    setTimeout(() => { switchToLogin(); }, 1000);
                } else {
                    // 注册失败，通知Qt端处理
                    if (qtBridge && qtBridge.onRegisterError) {
                        qtBridge.onRegisterError(result.message || '注册失败');
                    }
                }
            } catch (error) {
                // 网络错误，通知Qt端处理
                if (qtBridge && qtBridge.onRegisterError) {
                    qtBridge.onRegisterError('网络连接失败');
                }
                console.log('注册请求失败:', error);
            } finally {
                setLoading('register', false);
            }
        });

        // ================== 记住密码功能 ==================
        function loadSavedCredentials() {
            if (credentialsLoaded) return;
            try {
                if (qtBridge && qtBridge.loadCredentials) {
                    const credentials = qtBridge.loadCredentials();
                    if (credentials && credentials.hasCredentials) {
                        document.getElementById('loginUserId').value = credentials.userId || '';
                        document.getElementById('loginPassword').value = credentials.password || '';
                        document.getElementById('rememberMe').checked = credentials.rememberMe || false;
                    }
                }
                credentialsLoaded = true;
            } catch (e) { 
                console.log('无法加载保存的凭据:', e);
                credentialsLoaded = true; 
            }
        }

        // ================== 工具函数 ==================
        function setInvalid(inputId, errorId, msg) {
            document.getElementById(inputId).classList.add('is-invalid');
            document.getElementById(errorId).textContent = msg;
        }
        function resetValidation(type) {
            if (type === 'login') {
                ['loginUserId','loginPassword'].forEach(id => document.getElementById(id).classList.remove('is-invalid'));
            } else {
                ['registerUserId','registerName','registerPassword'].forEach(id => document.getElementById(id).classList.remove('is-invalid'));
            }
        }
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        function setLoading(type, loading) {
            let btn, loadingSpan, normalSpan;
            if (type === 'login') {
                btn = document.getElementById('loginBtn');
            } else {
                btn = document.getElementById('registerBtn');
            }
            loadingSpan = btn.querySelector('.loading');
            normalSpan = btn.querySelector('.normal');
            if (loading) {
                loadingSpan.style.display = 'inline';
                normalSpan.style.display = 'none';
                btn.disabled = true;
            } else {
                loadingSpan.style.display = 'none';
                normalSpan.style.display = 'inline';
                btn.disabled = false;
            }
        }

    </script>
</body>
</html>
