<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录API调试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 3px; width: 200px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>登录API调试工具</h1>
    
    <div class="debug-section">
        <h3>1. 登录请求参数</h3>
        <div class="form-group">
            <label>用户ID:</label>
            <input type="text" id="userId" value="test@example.com" placeholder="必填">
        </div>
        <div class="form-group">
            <label>密码:</label>
            <input type="password" id="password" value="password123" placeholder="必填">
        </div>
        <div class="form-group">
            <label>设备ID:</label>
            <input type="text" id="deviceId" value="" placeholder="可选，自动生成">
        </div>
        <div class="form-group">
            <label>设备名称:</label>
            <input type="text" id="deviceName" value="测试设备" placeholder="可选">
        </div>
        <div class="form-group">
            <label>设备类型:</label>
            <select id="deviceType">
                <option value="web">Web</option>
                <option value="mobile">Mobile</option>
                <option value="desktop">Desktop</option>
            </select>
        </div>
        <div class="form-group">
            <label>用户类型:</label>
            <select id="userType">
                <option value="">不指定</option>
                <option value="register">普通用户</option>
                <option value="auth">授权用户</option>
                <option value="enterprise">企业用户</option>
            </select>
        </div>
        <button onclick="testLogin()">发送登录请求</button>
    </div>
    
    <div class="debug-section">
        <h3>2. 请求详情</h3>
        <div id="requestDetails" class="result info">
            <p>点击"发送登录请求"查看请求详情</p>
        </div>
    </div>
    
    <div class="debug-section">
        <h3>3. 响应详情</h3>
        <div id="responseDetails" class="result info">
            <p>点击"发送登录请求"查看响应详情</p>
        </div>
    </div>
    
    <div class="debug-section">
        <h3>4. 常见问题排查</h3>
        <button onclick="testMinimalRequest()">测试最小请求</button>
        <button onclick="testWithWrongPassword()">测试错误密码</button>
        <button onclick="testNonExistentUser()">测试不存在的用户</button>
        <div id="troubleshootResult" class="result"></div>
    </div>

    <script>
        function testLogin() {
            const requestData = {
                userId: document.getElementById('userId').value,
                password: document.getElementById('password').value,
                deviceId: document.getElementById('deviceId').value || null,
                deviceName: document.getElementById('deviceName').value || null,
                deviceType: document.getElementById('deviceType').value || null,
                type: document.getElementById('userType').value || null
            };
            
            // 显示请求详情
            document.getElementById('requestDetails').innerHTML = `
                <h4>请求详情:</h4>
                                        <p><strong>URL:</strong> /api/login</p>
                <p><strong>Method:</strong> POST</p>
                <p><strong>Headers:</strong></p>
                <pre>Content-Type: application/json; charset=UTF-8
Accept: application/json; charset=UTF-8</pre>
                <p><strong>Request Body:</strong></p>
                <pre>${JSON.stringify(requestData, null, 2)}</pre>
            `;
            
            // 发送请求
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=UTF-8',
                    'Accept': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                const responseDetails = document.getElementById('responseDetails');
                responseDetails.innerHTML = `
                    <h4>响应详情:</h4>
                    <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                    <p><strong>Headers:</strong></p>
                    <pre>${Array.from(response.headers.entries()).map(([k,v]) => `${k}: ${v}`).join('\n')}</pre>
                `;
                
                return response.text();
            })
            .then(data => {
                const responseDetails = document.getElementById('responseDetails');
                responseDetails.innerHTML += `
                    <p><strong>Response Body:</strong></p>
                    <pre>${data}</pre>
                `;
                
                // 添加颜色标识
                if (responseDetails.innerHTML.includes('"用户不存在"') || 
                    responseDetails.innerHTML.includes('"密码错误"') ||
                    responseDetails.innerHTML.includes('"账户已被锁定"')) {
                    responseDetails.className = 'result error';
                } else if (responseDetails.innerHTML.includes('"token"')) {
                    responseDetails.className = 'result success';
                } else {
                    responseDetails.className = 'result info';
                }
            })
            .catch(error => {
                document.getElementById('responseDetails').innerHTML = `
                    <h4>请求失败:</h4>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
                document.getElementById('responseDetails').className = 'result error';
            });
        }
        
        function testMinimalRequest() {
            const resultDiv = document.getElementById('troubleshootResult');
            resultDiv.innerHTML = '正在测试最小请求...';
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify({
                    userId: 'test@example.com',
                    password: 'password123'
                })
            })
            .then(response => response.text())
            .then(data => {
                resultDiv.innerHTML = `
                    <h4>最小请求测试结果:</h4>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${data}</pre>
                `;
                resultDiv.className = 'result info';
            })
            .catch(error => {
                resultDiv.innerHTML = `<h4>最小请求测试失败:</h4><p>${error.message}</p>`;
                resultDiv.className = 'result error';
            });
        }
        
        function testWithWrongPassword() {
            const resultDiv = document.getElementById('troubleshootResult');
            resultDiv.innerHTML = '正在测试错误密码...';
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify({
                    userId: 'test@example.com',
                    password: 'wrongpassword'
                })
            })
            .then(response => response.text())
            .then(data => {
                resultDiv.innerHTML = `
                    <h4>错误密码测试结果:</h4>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${data}</pre>
                `;
                resultDiv.className = 'result error';
            })
            .catch(error => {
                resultDiv.innerHTML = `<h4>错误密码测试失败:</h4><p>${error.message}</p>`;
                resultDiv.className = 'result error';
            });
        }
        
        function testNonExistentUser() {
            const resultDiv = document.getElementById('troubleshootResult');
            resultDiv.innerHTML = '正在测试不存在的用户...';
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify({
                    userId: 'nonexistent@example.com',
                    password: 'password123'
                })
            })
            .then(response => response.text())
            .then(data => {
                resultDiv.innerHTML = `
                    <h4>不存在用户测试结果:</h4>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${data}</pre>
                `;
                resultDiv.className = 'result error';
            })
            .catch(error => {
                resultDiv.innerHTML = `<h4>不存在用户测试失败:</h4><p>${error.message}</p>`;
                resultDiv.className = 'result error';
            });
        }
    </script>
</body>
</html>
