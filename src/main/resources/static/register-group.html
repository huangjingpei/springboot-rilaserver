<!DOCTYPE html>
<html>
<head>
    <title>企业账号申请/管理</title>
    <style>
        .container { margin: 40px auto; max-width: 500px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, button { width: 100%; padding: 8px; }
        .msg { color: red; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>企业账号申请/管理</h2>
    <div class="input-group">
        <label>企业账号（userId/邮箱/授权码）:</label>
        <input type="text" id="userId" required>
    </div>
    <div class="input-group">
        <label>最大设备数:</label>
        <input type="number" id="maxDevices" value="20" min="1" required>
    </div>
    <button onclick="addAuthUser()">添加企业账号</button>
    <div class="msg" id="msg"></div>
    <h3>已授权企业账号</h3>
    <table>
        <thead>
        <tr><th>账号</th><th>最大设备数</th></tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>
</div>
<script>
    async function addAuthUser() {
        const userId = document.getElementById('userId').value;
        const maxDevices = document.getElementById('maxDevices').value;
        const msgDiv = document.getElementById('msg');
        msgDiv.innerText = '';
        if (!userId || !maxDevices) {
            msgDiv.innerText = '请填写完整信息';
            return;
        }
        try {
            const resp = await fetch('/admin/addAuthUser', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, maxDevices })
            });
            const text = await resp.text();
            if (resp.ok) {
                msgDiv.style.color = 'green';
                msgDiv.innerText = '添加成功！';
                loadUserList();
            } else {
                msgDiv.style.color = 'red';
                msgDiv.innerText = text;
            }
        } catch (e) {
            msgDiv.style.color = 'red';
            msgDiv.innerText = '操作失败: ' + e.message;
        }
    }

    async function loadUserList() {
        const tbody = document.getElementById('userList');
        tbody.innerHTML = '';
        try {
            const resp = await fetch('/admin/listAuthUsers');
            const users = await resp.json();
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${u.userId}</td><td>${u.maxDevices}</td>`;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="2">加载失败</td></tr>';
        }
    }
    window.onload = loadUserList;
</script>
</body>
</html>
