<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册功能测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .result { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">注册功能测试</h1>
        
        <!-- 测试用例1：基本注册 -->
        <div class="test-section">
            <h4>测试用例1：基本注册（普通用户）</h4>
            <button class="btn btn-primary" onclick="testBasicRegister()">执行测试</button>
            <div id="result1" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例2：VIP用户注册 -->
        <div class="test-section">
            <h4>测试用例2：VIP用户注册</h4>
            <button class="btn btn-success" onclick="testVipRegister()">执行测试</button>
            <div id="result2" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例3：企业用户注册 -->
        <div class="test-section">
            <h4>测试用例3：企业用户注册</h4>
            <button class="btn btn-warning" onclick="testEnterpriseRegister()">执行测试</button>
            <div id="result3" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例4：重复注册 -->
        <div class="test-section">
            <h4>测试用例4：重复注册（应该失败）</h4>
            <button class="btn btn-danger" onclick="testDuplicateRegister()">执行测试</button>
            <div id="result4" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例5：参数验证 -->
        <div class="test-section">
            <h4>测试用例5：参数验证（无效手机号）</h4>
            <button class="btn btn-info" onclick="testInvalidPhone()">执行测试</button>
            <div id="result5" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例6：套餐功能测试 -->
        <div class="test-section">
            <h4>测试用例6：套餐功能测试（高级套餐）</h4>
            <button class="btn btn-dark" onclick="testPackageFunction()">执行测试</button>
            <div id="result6" class="result" style="display: none;"></div>
        </div>
        
        <!-- 查看所有用户 -->
        <div class="test-section">
            <h4>查看所有注册用户</h4>
            <button class="btn btn-secondary" onclick="listAllUsers()">查看用户列表</button>
            <div id="userList" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 生成随机用户ID
        function generateRandomUserId() {
            return 'test' + Date.now() + '@example.com';
        }
        
        // 生成随机手机号
        function generateRandomPhone() {
            return '138' + Math.floor(Math.random() * 100000000).toString().padStart(8, '0');
        }
        
        // 显示结果
        function showResult(elementId, success, message) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result ' + (success ? 'success' : 'error');
            element.innerHTML = message;
        }
        
        // 测试用例1：基本注册
        async function testBasicRegister() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: '测试用户',
                password: 'test123',
                type: 'register',
                maxDevices: 1,
                maxStreams: 1,
                userPackage: {
                    type: 'basic',
                    price: 0.00,
                    discount: 1.00,
                    description: '基础套餐，适合个人用户使用',
                    maxUsers: 1
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result1', true, 
                        `注册成功！<br>用户ID: ${testData.userId}<br>手机号: ${testData.phone}<br>类型: ${testData.type}<br>套餐: ${testData.userPackage.type} (¥${testData.userPackage.price}/月)`);
                } else {
                    showResult('result1', false, `注册失败: ${result}`);
                }
            } catch (error) {
                showResult('result1', false, `请求失败: ${error.message}`);
            }
        }
        
        // 测试用例2：VIP用户注册
        async function testVipRegister() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: 'VIP测试用户',
                password: 'vip123',
                type: 'vip',
                maxDevices: 3,
                maxStreams: 2,
                userPackage: {
                    type: 'standard',
                    price: 29.90,
                    discount: 1.00,
                    description: '标准套餐，适合小团队使用',
                    maxUsers: 5
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result2', true, 
                        `VIP用户注册成功！<br>用户ID: ${testData.userId}<br>手机号: ${testData.phone}<br>类型: ${testData.type}<br>最大设备数: ${testData.maxDevices}<br>最大推流数: ${testData.maxStreams}<br>套餐: ${testData.userPackage.type} (¥${testData.userPackage.price}/月)`);
                } else {
                    showResult('result2', false, `注册失败: ${result}`);
                }
            } catch (error) {
                showResult('result2', false, `请求失败: ${error.message}`);
            }
        }
        
        // 测试用例3：企业用户注册
        async function testEnterpriseRegister() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: '企业测试用户',
                password: 'enterprise123',
                type: 'enterprise',
                maxDevices: 10,
                maxStreams: 5,
                userPackage: {
                    type: 'enterprise',
                    price: 299.90,
                    discount: 0.90,
                    description: '企业套餐，适合大型企业使用',
                    maxUsers: 100
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result3', true, 
                        `企业用户注册成功！<br>用户ID: ${testData.userId}<br>手机号: ${testData.phone}<br>类型: ${testData.type}<br>最大设备数: ${testData.maxDevices}<br>最大推流数: ${testData.maxStreams}<br>套餐: ${testData.userPackage.type} (¥${testData.userPackage.price}/月)`);
                } else {
                    showResult('result3', false, `注册失败: ${result}`);
                }
            } catch (error) {
                showResult('result3', false, `请求失败: ${error.message}`);
            }
        }
        
        // 测试用例4：重复注册
        async function testDuplicateRegister() {
            const testData = {
                userId: 'duplicate@example.com',
                phone: '13800000000',
                name: '重复用户',
                password: 'duplicate123',
                type: 'register',
                maxDevices: 1,
                maxStreams: 1,
                userPackage: {
                    type: 'basic',
                    price: 0.00,
                    discount: 1.00,
                    description: '基础套餐',
                    maxUsers: 1
                }
            };
            
            try {
                // 第一次注册
                const response1 = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                // 第二次注册（应该失败）
                const response2 = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response2.text();
                
                if (!response2.ok && result.includes('用户已存在')) {
                    showResult('result4', true, `重复注册测试成功：${result}`);
                } else {
                    showResult('result4', false, `重复注册测试失败：应该阻止重复注册`);
                }
            } catch (error) {
                showResult('result4', false, `请求失败: ${error.message}`);
            }
        }
        
        // 测试用例5：参数验证
        async function testInvalidPhone() {
            const testData = {
                userId: generateRandomUserId(),
                phone: '12345', // 无效手机号
                name: '无效手机号用户',
                password: 'invalid123',
                type: 'register',
                maxDevices: 1,
                maxStreams: 1,
                userPackage: {
                    type: 'basic',
                    price: 0.00,
                    discount: 1.00,
                    description: '基础套餐',
                    maxUsers: 1
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (!response.ok) {
                    showResult('result5', true, `参数验证测试成功：${result}`);
                } else {
                    showResult('result5', false, `参数验证测试失败：应该验证手机号格式`);
                }
            } catch (error) {
                showResult('result5', false, `请求失败: ${error.message}`);
            }
        }
        
        // 测试用例6：套餐功能测试
        async function testPackageFunction() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: '套餐测试用户',
                password: 'package123',
                type: 'vip',
                maxDevices: 5,
                maxStreams: 3,
                userPackage: {
                    type: 'premium',
                    price: 99.90,
                    discount: 0.95,
                    description: '高级套餐，适合中型企业使用，包含更多功能和更好的服务支持',
                    maxUsers: 20
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result6', true, 
                        `套餐功能测试成功！<br>用户ID: ${testData.userId}<br>手机号: ${testData.phone}<br>类型: ${testData.type}<br>最大设备数: ${testData.maxDevices}<br>最大推流数: ${testData.maxStreams}<br>套餐类型: ${testData.userPackage.type}<br>套餐价格: ¥${testData.userPackage.price}/月<br>折扣率: ${testData.userPackage.discount}<br>最大用户数: ${testData.userPackage.maxUsers}<br>套餐描述: ${testData.userPackage.description}`);
                } else {
                    showResult('result6', false, `套餐功能测试失败: ${result}`);
                }
            } catch (error) {
                showResult('result6', false, `请求失败: ${error.message}`);
            }
        }
        
        // 查看所有用户
        async function listAllUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const result = await response.text();
                
                if (response.ok) {
                    showResult('userList', true, `用户列表：<pre>${result}</pre>`);
                } else {
                    showResult('userList', false, `获取用户列表失败: ${result}`);
                }
            } catch (error) {
                showResult('userList', false, `请求失败: ${error.message}`);
            }
        }
    </script>
</body>
</html>
