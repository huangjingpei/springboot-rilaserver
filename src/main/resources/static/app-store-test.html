<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用商城API测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>应用商城API测试</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>统计信息测试</h3>
                <button class="btn btn-primary" onclick="testStats()">测试统计API</button>
                <div id="statsResult" class="mt-3"></div>
            </div>
            
            <div class="col-md-6">
                <h3>应用列表测试</h3>
                <button class="btn btn-success" onclick="testSearch()">测试搜索API</button>
                <div id="searchResult" class="mt-3"></div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <h3>类型筛选测试</h3>
                <button class="btn btn-info" onclick="testTypeFilter('GAME')">游戏类型</button>
                <button class="btn btn-info" onclick="testTypeFilter('TOOL')">工具类型</button>
                <div id="typeResult" class="mt-3"></div>
            </div>
            
            <div class="col-md-6">
                <h3>免费应用测试</h3>
                <button class="btn btn-warning" onclick="testFreeApps()">免费应用</button>
                <div id="freeResult" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        async function testStats() {
            const resultDiv = document.getElementById('statsResult');
            resultDiv.innerHTML = '<p>正在测试...</p>';
            
            try {
                const [totalApps, freeApps, featuredApps, totalDownloads] = await Promise.all([
                    fetch('/api/apps/count').then(r => r.json()),
                    fetch('/api/apps/count/free').then(r => r.json()),
                    fetch('/api/apps/count/featured').then(r => r.json()),
                    fetch('/api/apps/count/downloads').then(r => r.json())
                ]);
                
                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        <h5>统计结果:</h5>
                        <p>总应用数: ${totalApps}</p>
                        <p>免费应用数: ${freeApps}</p>
                        <p>推荐应用数: ${featuredApps}</p>
                        <p>总下载数: ${totalDownloads}</p>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
            }
        }
        
        async function testSearch() {
            const resultDiv = document.getElementById('searchResult');
            resultDiv.innerHTML = '<p>正在测试...</p>';
            
            try {
                const response = await fetch('/api/apps/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        page: 0,
                        size: 5
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        <h5>搜索结果:</h5>
                        <p>总数: ${data.totalElements}</p>
                        <p>当前页: ${data.content.length} 个应用</p>
                        <ul>
                            ${data.content.map(app => `<li>${app.name} (${app.type})</li>`).join('')}
                        </ul>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
            }
        }
        
        async function testTypeFilter(type) {
            const resultDiv = document.getElementById('typeResult');
            resultDiv.innerHTML = '<p>正在测试...</p>';
            
            try {
                const response = await fetch('/api/apps/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: type,
                        page: 0,
                        size: 5
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="alert alert-info">
                        <h5>${type} 类型筛选结果:</h5>
                        <p>总数: ${data.totalElements}</p>
                        <p>当前页: ${data.content.length} 个应用</p>
                        <ul>
                            ${data.content.map(app => `<li>${app.name} (${app.type})</li>`).join('')}
                        </ul>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
            }
        }
        
        async function testFreeApps() {
            const resultDiv = document.getElementById('freeResult');
            resultDiv.innerHTML = '<p>正在测试...</p>';
            
            try {
                const response = await fetch('/api/apps/free?page=0&size=5');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="alert alert-warning">
                        <h5>免费应用结果:</h5>
                        <p>总数: ${data.totalElements}</p>
                        <p>当前页: ${data.content.length} 个应用</p>
                        <ul>
                            ${data.content.map(app => `<li>${app.name} (¥${app.price})</li>`).join('')}
                        </ul>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
