<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套餐信息测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">套餐信息测试</h1>
        
        <!-- 测试用例1：注册带套餐信息的用户 -->
        <div class="test-section">
            <h4>测试用例1：注册带套餐信息的用户</h4>
            <button class="btn btn-primary" onclick="testRegisterWithPackage()">测试注册</button>
            <div id="result1" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例2：查看所有用户（包含套餐信息） -->
        <div class="test-section">
            <h4>测试用例2：查看所有用户（包含套餐信息）</h4>
            <button class="btn btn-success" onclick="testGetAllUsers()">查看用户列表</button>
            <div id="result2" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例3：测试不同套餐类型 -->
        <div class="test-section">
            <h4>测试用例3：测试不同套餐类型</h4>
            <div class="row">
                <div class="col-md-3">
                    <button class="btn btn-outline-primary" onclick="testPackageType('basic')">基础套餐</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-success" onclick="testPackageType('standard')">标准套餐</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-warning" onclick="testPackageType('premium')">高级套餐</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-danger" onclick="testPackageType('enterprise')">企业套餐</button>
                </div>
            </div>
            <div id="result3" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例4：验证套餐数据结构 -->
        <div class="test-section">
            <h4>测试用例4：验证套餐数据结构</h4>
            <button class="btn btn-info" onclick="testPackageStructure()">验证数据结构</button>
            <div id="result4" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 生成随机用户ID
        function generateRandomUserId() {
            return 'package_test_' + Date.now() + '@example.com';
        }
        
        // 生成随机手机号
        function generateRandomPhone() {
            return '139' + Math.floor(Math.random() * 100000000).toString().padStart(8, '0');
        }
        
        // 显示结果
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result ' + type;
            element.innerHTML = message;
        }
        
        // 测试用例1：注册带套餐信息的用户
        async function testRegisterWithPackage() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: '套餐测试用户',
                password: 'test123',
                type: 'vip',
                maxDevices: 3,
                maxStreams: 2,
                userPackage: {
                    type: 'premium',
                    price: 99.90,
                    discount: 0.95,
                    description: '高级套餐，适合中型企业使用',
                    maxUsers: 20
                }
            };
            
            try {
                console.log('发送注册数据:', JSON.stringify(testData, null, 2));
                
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                console.log('注册响应:', result);
                
                if (response.ok) {
                    showResult('result1', 
                        `✅ 注册成功！<br>
                        用户ID: ${testData.userId}<br>
                        手机号: ${testData.phone}<br>
                        用户类型: ${testData.type}<br>
                        套餐类型: ${testData.userPackage.type}<br>
                        套餐价格: ¥${testData.userPackage.price}/月<br>
                        套餐描述: ${testData.userPackage.description}<br>
                        最大用户数: ${testData.userPackage.maxUsers}`, 'success');
                } else {
                    showResult('result1', `❌ 注册失败: ${result}`, 'error');
                }
            } catch (error) {
                showResult('result1', `❌ 请求失败: ${error.message}`, 'error');
            }
        }
        
        // 测试用例2：查看所有用户
        async function testGetAllUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result2', 
                        `<strong>用户列表（包含套餐信息）：</strong><br>
                        <pre>${result}</pre>`, 'info');
                } else {
                    showResult('result2', `❌ 获取用户列表失败: ${result}`, 'error');
                }
            } catch (error) {
                showResult('result2', `❌ 请求失败: ${error.message}`, 'error');
            }
        }
        
        // 测试用例3：测试不同套餐类型
        async function testPackageType(packageType) {
            const packageConfigs = {
                'basic': { price: 0.00, discount: 1.00, description: '基础套餐', maxUsers: 1 },
                'standard': { price: 29.90, discount: 1.00, description: '标准套餐', maxUsers: 5 },
                'premium': { price: 99.90, discount: 0.95, description: '高级套餐', maxUsers: 20 },
                'enterprise': { price: 299.90, discount: 0.90, description: '企业套餐', maxUsers: 100 }
            };
            
            const config = packageConfigs[packageType];
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: `${packageType}套餐测试用户`,
                password: 'test123',
                type: 'register',
                maxDevices: 1,
                maxStreams: 1,
                userPackage: {
                    type: packageType,
                    price: config.price,
                    discount: config.discount,
                    description: config.description,
                    maxUsers: config.maxUsers
                }
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    showResult('result3', 
                        `✅ ${packageType}套餐注册成功！<br>
                        用户ID: ${testData.userId}<br>
                        套餐类型: ${packageType}<br>
                        价格: ¥${config.price}/月<br>
                        折扣: ${config.discount}<br>
                        最大用户数: ${config.maxUsers}`, 'success');
                } else {
                    showResult('result3', `❌ ${packageType}套餐注册失败: ${result}`, 'error');
                }
            } catch (error) {
                showResult('result3', `❌ 请求失败: ${error.message}`, 'error');
            }
        }
        
        // 测试用例4：验证套餐数据结构
        function testPackageStructure() {
            const testData = {
                userId: generateRandomUserId(),
                phone: generateRandomPhone(),
                name: '数据结构测试用户',
                password: 'test123',
                type: 'register',
                maxDevices: 1,
                maxStreams: 1,
                userPackage: {
                    type: 'basic',
                    price: 0.00,
                    discount: 1.00,
                    description: '基础套餐',
                    maxUsers: 1
                }
            };
            
            showResult('result4', 
                `<strong>套餐数据结构验证：</strong><br>
                <pre>${JSON.stringify(testData, null, 2)}</pre><br>
                <strong>字段说明：</strong><br>
                • userPackage.type: 套餐类型<br>
                • userPackage.price: 套餐价格<br>
                • userPackage.discount: 折扣率<br>
                • userPackage.description: 套餐描述<br>
                • userPackage.maxUsers: 最大用户数`, 'info');
        }
    </script>
</body>
</html>
