<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>简单登录测试</h1>
    
    <div>
        <button onclick="testFormLogin()">测试 /form-login 访问</button>
        <button onclick="testLoginPage()">测试登录页面</button>
        <button onclick="testRegisterPage()">测试注册页面</button>
    </div>
    
    <div id="result"></div>
    
    <script>
        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="test-result ${isSuccess ? 'success' : 'error'}">${message}</div>`;
        }
        
        async function testFormLogin() {
            try {
                console.log('开始测试 /form-login 访问...');
                const response = await fetch('/form-login', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                console.log('响应状态:', response.status);
                console.log('响应头:', response.headers);
                
                if (response.ok) {
                    const text = await response.text();
                    showResult(`✅ /form-login 访问成功！状态码: ${response.status}，内容长度: ${text.length} 字符`, true);
                } else {
                    showResult(`❌ /form-login 访问失败！状态码: ${response.status}`, false);
                }
            } catch (error) {
                console.error('请求失败:', error);
                showResult(`❌ 请求失败: ${error.message}`, false);
            }
        }
        
        async function testLoginPage() {
            try {
                const response = await fetch('/login', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showResult(`✅ /login 访问成功！状态码: ${response.status}`, true);
                } else {
                    showResult(`❌ /login 访问失败！状态码: ${response.status}`, false);
                }
            } catch (error) {
                showResult(`❌ 请求失败: ${error.message}`, false);
            }
        }
        
        async function testRegisterPage() {
            try {
                const response = await fetch('/register-user.html', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showResult(`✅ /register-user.html 访问成功！状态码: ${response.status}`, true);
                } else {
                    showResult(`❌ /register-user.html 访问失败！状态码: ${response.status}`, false);
                }
            } catch (error) {
                showResult(`❌ 请求失败: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
