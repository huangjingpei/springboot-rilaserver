<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录功能测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .result { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">登录功能测试</h1>
        
        <!-- 测试用例1：访问登录页面 -->
        <div class="test-section">
            <h4>测试用例1：访问登录页面</h4>
            <button class="btn btn-primary" onclick="testLoginPage()">测试访问登录页面</button>
            <div id="result1" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例2：登录功能 -->
        <div class="test-section">
            <h4>测试用例2：登录功能</h4>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="testUserId" class="form-label">用户ID/邮箱</label>
                        <input type="text" class="form-control" id="testUserId" placeholder="输入用户ID或邮箱">
                    </div>
                    <div class="mb-3">
                        <label for="testPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="testPassword" placeholder="输入密码">
                    </div>
                    <button class="btn btn-success" onclick="testLogin()">测试登录</button>
                </div>
            </div>
            <div id="result2" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例3：检查登录状态 -->
        <div class="test-section">
            <h4>测试用例3：检查登录状态</h4>
            <button class="btn btn-info" onclick="checkLoginStatus()">检查登录状态</button>
            <div id="result3" class="result" style="display: none;"></div>
        </div>
        
        <!-- 测试用例4：登出功能 -->
        <div class="test-section">
            <h4>测试用例4：登出功能</h4>
            <button class="btn btn-warning" onclick="testLogout()">测试登出</button>
            <div id="result4" class="result" style="display: none;"></div>
        </div>
        
        <!-- 导航链接 -->
        <div class="test-section">
            <h4>导航链接</h4>
            <a href="/form-login" class="btn btn-primary" target="_blank">打开登录页面</a>
            <a href="/register-user.html" class="btn btn-success" target="_blank">打开注册页面</a>
            <a href="/register-test.html" class="btn btn-info" target="_blank">打开注册测试页面</a>
        </div>
    </div>

    <script>
        // 显示结果
        function showResult(elementId, success, message) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result ' + (success ? 'success' : 'error');
            element.innerHTML = message;
        }
        
        // 测试用例1：访问登录页面
        async function testLoginPage() {
            try {
                const response = await fetch('/form-login', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showResult('result1', true, '登录页面访问成功！状态码: ' + response.status);
                } else {
                    showResult('result1', false, '登录页面访问失败！状态码: ' + response.status);
                }
            } catch (error) {
                showResult('result1', false, '请求失败: ' + error.message);
            }
        }
        
        // 测试用例2：登录功能
        async function testLogin() {
            const userId = document.getElementById('testUserId').value.trim();
            const password = document.getElementById('testPassword').value;
            
            if (!userId || !password) {
                showResult('result2', false, '请填写用户ID和密码');
                return;
            }
            
            try {
                // 创建表单数据
                const formData = new FormData();
                formData.append('username', userId);
                formData.append('password', password);
                
                const response = await fetch('/form-login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                if (response.ok) {
                    showResult('result2', true, '登录成功！状态码: ' + response.status);
                } else if (response.status === 302) {
                    // 重定向通常表示登录成功
                    showResult('result2', true, '登录成功！（重定向到首页）');
                } else {
                    showResult('result2', false, '登录失败！状态码: ' + response.status);
                }
            } catch (error) {
                showResult('result2', false, '请求失败: ' + error.message);
            }
        }
        
        // 测试用例3：检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/user/status', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const result = await response.text();
                    showResult('result3', true, '登录状态检查成功：' + result);
                } else {
                    showResult('result3', false, '登录状态检查失败！状态码: ' + response.status);
                }
            } catch (error) {
                showResult('result3', false, '请求失败: ' + error.message);
            }
        }
        
        // 测试用例4：登出功能
        async function testLogout() {
            try {
                const response = await fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                
                if (response.ok || response.status === 302) {
                    showResult('result4', true, '登出成功！');
                } else {
                    showResult('result4', false, '登出失败！状态码: ' + response.status);
                }
            } catch (error) {
                showResult('result4', false, '请求失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
