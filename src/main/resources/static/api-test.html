<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
        }
        .response-area {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="container mt-4">
    <h1 class="mb-4">API测试页面</h1>
    
    <!-- 注册测试 -->
    <div class="test-section">
        <h3>用户注册测试</h3>
        <form id="registerForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="regUserId" class="form-label">用户ID（手机号）</label>
                    <input type="tel" class="form-control" id="regUserId" required pattern="^1[3-9]\d{9}$">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="regPassword" class="form-label">密码</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="regName" class="form-label">用户姓名（可选）</label>
                    <input type="text" class="form-control" id="regName">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="regPhone" class="form-label">手机号码（可选）</label>
                    <input type="tel" class="form-control" id="regPhone" pattern="^1[3-9]\d{9}$">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="regType" class="form-label">用户类型</label>
                    <select class="form-select" id="regType">
                        <option value="register">普通用户</option>
                        <option value="auth">授权用户</option>
                        <option value="enterprise">企业用户</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="regMaxDevices" class="form-label">最大设备数</label>
                    <input type="number" class="form-control" id="regMaxDevices" value="1" min="1">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">测试注册</button>
        </form>
        <div id="registerResponse" class="response-area" style="display: none;"></div>
    </div>

    <!-- 登录测试 -->
    <div class="test-section">
        <h3>用户登录测试</h3>
        <form id="loginForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="loginUserId" class="form-label">用户ID（手机号）</label>
                    <input type="tel" class="form-control" id="loginUserId" required pattern="^1[3-9]\d{9}$">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="loginPassword" class="form-label">密码</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="loginDeviceId" class="form-label">设备ID（可选）</label>
                <input type="text" class="form-control" id="loginDeviceId" placeholder="留空自动生成">
            </div>
            <button type="submit" class="btn btn-success">测试登录</button>
        </form>
        <div id="loginResponse" class="response-area" style="display: none;"></div>
    </div>

    <script>
        // 注册测试
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                userId: document.getElementById('regUserId').value,
                name: document.getElementById('regName').value || null,
                phone: document.getElementById('regPhone').value || null,
                password: document.getElementById('regPassword').value,
                type: document.getElementById('regType').value,
                maxDevices: parseInt(document.getElementById('regMaxDevices').value) || 1
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                const responseDiv = document.getElementById('registerResponse');
                responseDiv.style.display = 'block';
                responseDiv.textContent = `状态码: ${response.status}\n响应: ${JSON.stringify(result, null, 2)}`;
            } catch (error) {
                const responseDiv = document.getElementById('registerResponse');
                responseDiv.style.display = 'block';
                responseDiv.textContent = `错误: ${error.message}`;
            }
        });

        // 登录测试
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                userId: document.getElementById('loginUserId').value,
                password: document.getElementById('loginPassword').value,
                deviceId: document.getElementById('loginDeviceId').value || null
            };
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                const responseDiv = document.getElementById('loginResponse');
                responseDiv.style.display = 'block';
                responseDiv.textContent = `状态码: ${response.status}\n响应: ${JSON.stringify(result, null, 2)}`;
            } catch (error) {
                const responseDiv = document.getElementById('loginResponse');
                responseDiv.style.display = 'block';
                responseDiv.textContent = `错误: ${error.message}`;
            }
        });
    </script>
</body>
</html>
