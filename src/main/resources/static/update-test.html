<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件升级系统测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .test-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
        }
        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-top: 1rem;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #198754; }
        .error { color: #dc3545; }
        .info { color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">软件升级系统测试</h1>
        
        <!-- 检查更新测试 -->
        <div class="test-section">
            <h3>检查更新</h3>
            <div class="row">
                <div class="col-md-4">
                    <label for="currentVersion" class="form-label">当前版本</label>
                    <input type="text" class="form-control" id="currentVersion" value="1.0.0">
                </div>
                <div class="col-md-4">
                    <label for="platform" class="form-label">平台</label>
                    <select class="form-select" id="platform">
                        <option value="windows-x64">Windows x64</option>
                        <option value="macos-x64">macOS x64</option>
                        <option value="linux-x64">Linux x64</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-primary d-block" onclick="checkUpdate()">检查更新</button>
                </div>
            </div>
            <div id="checkUpdateResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- 版本比较测试 -->
        <div class="test-section">
            <h3>版本比较</h3>
            <div class="row">
                <div class="col-md-4">
                    <label for="version1" class="form-label">版本1</label>
                    <input type="text" class="form-control" id="version1" value="1.0.0">
                </div>
                <div class="col-md-4">
                    <label for="version2" class="form-label">版本2</label>
                    <input type="text" class="form-control" id="version2" value="1.1.0">
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-secondary d-block" onclick="compareVersions()">比较版本</button>
                </div>
            </div>
            <div id="compareResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- 版本验证测试 -->
        <div class="test-section">
            <h3>版本号验证</h3>
            <div class="row">
                <div class="col-md-8">
                    <label for="testVersion" class="form-label">测试版本号</label>
                    <input type="text" class="form-control" id="testVersion" value="1.2.3-beta">
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-info d-block" onclick="validateVersion()">验证版本号</button>
                </div>
            </div>
            <div id="validateResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- 强制更新查询 -->
        <div class="test-section">
            <h3>强制更新查询</h3>
            <div class="row">
                <div class="col-md-6">
                    <label for="mandatoryPlatform" class="form-label">平台</label>
                    <select class="form-select" id="mandatoryPlatform">
                        <option value="windows-x64">Windows x64</option>
                        <option value="macos-x64">macOS x64</option>
                        <option value="linux-x64">Linux x64</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-warning d-block" onclick="getMandatoryUpdates()">查询强制更新</button>
                </div>
            </div>
            <div id="mandatoryResult" class="result-box" style="display: none;"></div>
        </div>

        <!-- 升级包管理（需要管理员权限） -->
        <div class="test-section">
            <h3>升级包管理</h3>
            <div class="row mb-3">
                <div class="col-md-6">
                    <button class="btn btn-success" onclick="getAllPackages()">获取所有升级包</button>
                </div>
                <div class="col-md-6">
                    <button class="btn btn-outline-primary" onclick="getPlatforms()">获取支持平台</button>
                </div>
            </div>
            <div id="managementResult" class="result-box" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api/v1/updates';

        // 检查更新
        async function checkUpdate() {
            const currentVersion = document.getElementById('currentVersion').value;
            const platform = document.getElementById('platform').value;
            const resultDiv = document.getElementById('checkUpdateResult');

            try {
                const response = await fetch(`${API_BASE}/latest?currentVersion=${currentVersion}&platform=${platform}`);
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="success">✓ 请求成功</span>\n\n${JSON.stringify(data, null, 2)}`;
                
                if (data.hasUpdate) {
                    resultDiv.innerHTML += `\n\n<span class="info">发现新版本: ${data.latestVersion}</span>`;
                    if (data.isMandatory) {
                        resultDiv.innerHTML += `\n<span class="error">⚠ 这是强制更新</span>`;
                    }
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 请求失败: ${error.message}</span>`;
            }
        }

        // 比较版本
        async function compareVersions() {
            const version1 = document.getElementById('version1').value;
            const version2 = document.getElementById('version2').value;
            const resultDiv = document.getElementById('compareResult');

            try {
                const response = await fetch(`${API_BASE}/compare-versions?version1=${version1}&version2=${version2}`);
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="success">✓ 版本比较完成</span>\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 比较失败: ${error.message}</span>`;
            }
        }

        // 验证版本号
        async function validateVersion() {
            const version = document.getElementById('testVersion').value;
            const resultDiv = document.getElementById('validateResult');

            try {
                const response = await fetch(`${API_BASE}/validate-version?version=${version}`);
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                if (data.isValid) {
                    resultDiv.innerHTML = `<span class="success">✓ 版本号格式有效</span>\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ 版本号格式无效</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 验证失败: ${error.message}</span>`;
            }
        }

        // 获取强制更新
        async function getMandatoryUpdates() {
            const platform = document.getElementById('mandatoryPlatform').value;
            const resultDiv = document.getElementById('mandatoryResult');

            try {
                const response = await fetch(`${API_BASE}/mandatory/${platform}`);
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="success">✓ 强制更新查询完成</span>\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 查询失败: ${error.message}</span>`;
            }
        }

        // 获取所有升级包
        async function getAllPackages() {
            const resultDiv = document.getElementById('managementResult');

            try {
                const response = await fetch(`${API_BASE}?page=0&size=10`);
                if (response.status === 403) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<span class="error">✗ 需要管理员权限</span>`;
                    return;
                }
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="success">✓ 获取升级包列表成功</span>\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 获取失败: ${error.message}</span>`;
            }
        }

        // 获取支持平台
        async function getPlatforms() {
            const resultDiv = document.getElementById('managementResult');

            try {
                const response = await fetch(`${API_BASE}/platforms`);
                if (response.status === 403) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<span class="error">✗ 需要管理员权限</span>`;
                    return;
                }
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="success">✓ 获取平台列表成功</span>\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span class="error">✗ 获取失败: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
