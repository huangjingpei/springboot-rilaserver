# 本地开发环境配置
# 使用方式：--spring.profiles.active=dev

# 开发环境服务器配置
server.address=0.0.0.0
server.port=8080

# 数据库配置（本地开发）- 修改时区为中国标准时间
spring.datasource.url=jdbc:mysql://localhost:3306/login_system?serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
#spring.datasource.username=app_user
#spring.datasource.password=Z1b0@Must1!@huang

spring.datasource.username=root
spring.datasource.password=89dfu*#$ewr87l

# 应用商城配置
app.store.upload.path=uploads/apps/
app.store.image.path=uploads/images/

# 安全配置（本地开发环境）
security.max-login-attempts=10
security.lockout-duration-minutes=5
security.min-password-length=6
security.require-uppercase=false
security.require-lowercase=false
security.require-numbers=false
security.require-special-chars=false
security.password-expiry-days=365
security.max-failed-attempts-per-ip=50
security.ip-lockout-duration-minutes=10
security.session-timeout-minutes=60
security.allow-multiple-sessions=true

# 本地开发环境安全头配置
security.enable-hsts=false
security.enable-xss-protection=true
security.enable-content-type-options=true
security.enable-frame-options=true

# 本地开发环境内容安全策略（更宽松）
security.content-security-policy=default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';

# 本地开发环境速率限制（更宽松）
security.local-rate-limit-enabled=true
security.local-rate-limit-requests-per-minute=100
security.local-rate-limit-requests-per-hour=5000

# 流状态同步配置
# 是否启用新客户端状态同步
stream.sync.enabled=true
# 同步策略：user_only(仅用户自己的流), public_all(所有公开流), room_based(基于房间)
stream.sync.strategy=user_only
# 是否同步历史流状态（已结束的流）
stream.sync.include-history-streams=false
# 最大同步流数量限制
stream.sync.max-sync-streams=50
# 同步延迟（毫秒），避免连接建立时立即发送大量消息
stream.sync.sync-delay-ms=1000
# 是否同步其他用户的公开流
stream.sync.sync-public-streams=true
# 权限检查模式：strict(严格模式), loose(宽松模式), none(无检查)
stream.sync.permission-mode=loose

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

# 时区配置（开发环境）
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.locale=zh_CN

# Swagger配置（本地开发）
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# SmartCDN 配置（开发环境，默认关闭，如需启用请显式设置为true）
smartcdn.enabled=true
smartcdn.max-depth=3
smartcdn.max-subscribers-per-node=3

# 开发工具
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true 

# 文件存储配置 - 本地文件系统
app.file-storage.local.base-path=uploads
app.file-storage.local.base-url=http://${app.server.host}:${app.server.port}/files
app.file-storage.local.max-file-size=524288000
app.file-storage.local.allowed-extensions=zip,exe,msi,dmg,pkg,deb,rpm,tar.gz
