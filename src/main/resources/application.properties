# 字符编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 数据库配置 - 修改时区为中国标准时间
spring.datasource.url=jdbc:mysql://localhost:3306/login_system?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false
spring.datasource.username=app_user
spring.datasource.password=Z1b0@Must1!@huang

# JPA配置 - 修改时区为中国标准时间
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.CharSet=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# 安全配置
security.max-login-attempts=5
security.lockout-duration-minutes=1
security.min-password-length=6
security.require-uppercase=false
security.require-lowercase=false
security.require-numbers=false
security.require-special-chars=false
security.password-expiry-days=90
security.max-failed-attempts-per-ip=10
security.ip-lockout-duration-minutes=60
security.session-timeout-minutes=30
security.allow-multiple-sessions=true

# ZLM配置
zlm.enable=true
zlm.balance=round_robin
zlm.hook-enable=true

zlm.nodes[0].server-id=zlm
zlm.nodes[0].host="http://192.168.200.81:8080"
zlm.nodes[0].secret=035c73f7-bb6b-4889-a715-d9eb2d1925cc
zlm.nodes[0].enabled=true
zlm.nodes[0].hook-enabled=true

# 服务器配置
server.port=8080
# 允许所有IP地址访问（0.0.0.0表示监听所有网络接口）
server.address=0.0.0.0

# 动态主机配置 - 生产环境配置
app.server.host=192.168.1.102
app.server.port=8081
app.server.rtmp-port=1935

# ZLM媒体服务器配置
app.zlm.host=${app.server.host}
app.zlm.rtmp-port=${app.server.rtmp-port}
app.zlm.http-port=${app.server.port}

# 确保Tomcat正确处理外部请求
server.tomcat.accept-count=100
server.tomcat.max-connections=8192
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
# Tomcat配置
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto
server.tomcat.protocol-header-https-value=https
# 允许所有主机访问
server.tomcat.additional-tld-skip-patterns=*.jar
# 增加Tomcat连接超时时间，支持大文件上传
server.tomcat.connection-timeout=60000
server.tomcat.max-http-form-post-size=524288000

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# Spring Session配置
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.redis.flush-mode=on_save
spring.session.timeout=30m

# 服务器Session配置
server.servlet.session.timeout=30m

# 本地开发环境安全配置
# 注意：生产环境需要启用这些安全特性
security.enable-hsts=false
security.enable-xss-protection=true
security.enable-content-type-options=true
security.enable-frame-options=true

# 本地开发环境内容安全策略（更宽松，允许连接到自身）
security.content-security-policy=default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';

# 本地开发环境速率限制（更宽松）
security.local-rate-limit-enabled=true
security.local-rate-limit-requests-per-minute=60
security.local-rate-limit-requests-per-hour=1000

# MIME类型配置
server.mime-mappings.enabled=true
server.mime-mappings.mappings.js=application/javascript

# 升级系统配置
app.update.download-url-prefix=/api/v1/updates/download
app.update.hash-algorithm=SHA-256

# 文件存储配置 - 本地文件系统
app.file-storage.local.base-path=uploads
app.file-storage.local.base-url=http://${app.server.host}:${app.server.port}/files
app.file-storage.local.max-file-size=524288000
app.file-storage.local.allowed-extensions=zip,exe,msi,dmg,pkg,deb,rpm,tar.gz

# 文件上传配置
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

# 静态资源映射（用于文件下载）
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/files/**

# SmartCDN 配置（默认关闭，如需启用请显式设置为true）
smartcdn.enabled=true
smartcdn.max-depth=3
smartcdn.max-subscribers-per-node=3

# 时区配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.locale=zh_CN

# 僵尸流清理配置
stream.zombie.timeout.minutes=30
stream.cleanup.scheduler.enabled=true
